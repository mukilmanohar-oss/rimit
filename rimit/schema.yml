components:
  schemas:
    AuthToken:
      type: object
      properties:
        token:
          type: string
          readOnly: true
      required:
      - token
    AuthTokenRequest:
      type: object
      properties:
        username:
          type: string
          writeOnly: true
          minLength: 1
        password:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - password
      - username
    BlankEnum:
      enum:
      - ''
    ChannelEnum:
      enum:
      - whatsapp
      - sms
      - email
      type: string
      description: |-
        * `whatsapp` - WhatsApp
        * `sms` - SMS
        * `email` - Email
    Course:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        fees:
          type: array
          items:
            $ref: '#/components/schemas/FeeStructure'
          readOnly: true
        university_name:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        name:
          type: string
          maxLength: 300
        stream:
          $ref: '#/components/schemas/StreamEnum'
        duration_months:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        eligibility_text:
          type: string
        is_active:
          type: boolean
        university:
          type: string
          format: uuid
      required:
      - created_at
      - duration_months
      - fees
      - id
      - name
      - stream
      - university
      - university_name
      - updated_at
    CourseList:
      type: object
      description: Lightweight serializer for list view (no nested fees).
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 300
        stream:
          $ref: '#/components/schemas/StreamEnum'
        duration_months:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        is_active:
          type: boolean
        university:
          type: string
          format: uuid
        university_name:
          type: string
          readOnly: true
        university_state:
          type: string
