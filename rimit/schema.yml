  /api/v1/enrollments/:
    get:
      operationId: enrollments_list
      description: |-
        Enrollment management with Session Enforcement Matrix validation.

        Status transitions are validated against the Enrollment.TRANSITIONS state machine.
      parameters:
      - in: query
        name: course
        schema:
          type: string
          format: uuid
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: session
        schema:
          type: string
          format: uuid
      - in: query
        name: status
        schema:
          type: string
          enum:
          - Applied
          - Cancelled
          - Document Verified
          - Enrolled
          - Enrollment Generated
          - Fee Paid
          - Fee Pending
        description: |-
          * `Applied` - Applied
          * `Document Verified` - Document Verified
          * `Fee Pending` - Fee Pending
          * `Fee Paid` - Fee Paid
          * `Enrolled` - Enrolled
          * `Enrollment Generated` - Enrollment Generated
          * `Cancelled` - Cancelled
      - in: query
        name: sub_center
        schema:
          type: string
          format: uuid
      tags:
      - enrollments
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
