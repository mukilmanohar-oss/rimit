openapi: 3.0.3
info:
  title: RIMIT B2B Aggregator API
  version: 1.0.0
  description: Unified B2B University Aggregator & Centralized Admission Management
    System
paths:
  /api/v1/academic-histories/:
    get:
      operationId: academic_histories_list
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: qualification
        schema:
          type: string
          enum:
          - 10th
          - 12th
          - Diploma
          - PG
          - UG
        description: |-
          * `10th` - 10th Standard
          * `12th` - 12th Standard
          * `UG` - Undergraduate
          * `PG` - Postgraduate
          * `Diploma` - Diploma
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: student
        schema:
          type: string
          format: uuid
      tags:
      - academic-histories
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedStudentAcademicHistoryList'
          description: ''
    post:
      operationId: academic_histories_create
      tags:
      - academic-histories
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StudentAcademicHistoryRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/StudentAcademicHistoryRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/StudentAcademicHistoryRequest'
        required: true
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentAcademicHistory'
          description: ''
  /api/v1/academic-histories/{id}/:
    get:
      operationId: academic_histories_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this student academic history.
        required: true
      tags:
      - academic-histories
      security:
      - tokenAuth: []
      - cookieAuth: []
