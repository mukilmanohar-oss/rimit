# RIMIT B2B Aggregator - Development Docker Compose
# Per Section 14.2 of the Development Plan
version: '3.8'

services:
  app:
    build: .
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --reload
    volumes:
      - ./:/app
    env_file: .env
    # depends_on: [db, redis, keycloak]
    ports:
      - '8000:8000'
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev

  frontend:
    build:
      context: ../
      dockerfile: Dockerfile.frontend
    ports:
      - '80:3000'
    depends_on: [app]
    environment:
      - PORT=3000
      - API_URL=http://app:8000
    command: >
      /bin/sh -c "sed -i 's|http://127.0.0.1:8000|http://app:8000|g' .next/routes-manifest.json && bun .next/standalone/server.js"

